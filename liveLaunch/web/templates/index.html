<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>CBOND_ON 实盘控制台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css?v=20260525_sellcol3" rel="stylesheet">
  </head>
  <body>
    <div class="container-fluid dashboard-shell">
      <header class="live-header">
        <div>
          <div class="d-flex align-items-center gap-2 flex-wrap">
            <h3 class="mb-0">CBOND_ON 实盘控制台</h3>
            <span id="live-state-badge" class="status-badge status-unknown">加载中</span>
          </div>
          <div id="live-state-reason" class="status-reason">正在读取实盘状态...</div>
        </div>
        <div class="live-header-meta">
          <div>
            <span class="meta-label">交易日</span>
            <span id="trade-date" class="meta-value">-</span>
          </div>
          <div>
            <span class="meta-label">目标日</span>
            <span id="target-date" class="meta-value">-</span>
          </div>
          <div>
            <span class="meta-label">心跳</span>
            <span id="heartbeat-summary" class="meta-value">-</span>
          </div>
          <div>
            <span class="meta-label">环境</span>
            <span id="env-name" class="meta-value">-</span>
          </div>
          <div>
            <span class="meta-label">刷新时间</span>
            <span id="last-updated" class="meta-value">-</span>
          </div>
        </div>
      </header>

      <section class="panel-card">
        <div class="panel-head">
          <div>
            <h5 class="mb-0">实盘流程</h5>
            <div id="next-action" class="panel-subtitle">正在读取状态...</div>
          </div>
        </div>
        <div id="live-timeline" class="live-timeline"></div>
      </section>

      <div class="row g-3 mt-1 top-workspace-row">
        <div class="col-xl-8 order-xl-2">
          <section class="panel-card main-workspace">
            <div class="panel-head">
              <div>
                <h5 class="mb-0">持仓与交易</h5>
                <div class="panel-subtitle">当前持仓、目标仓位、交易清单和仓位差异。</div>
              </div>
              <div class="trade-filter-bar">
                <div class="trade-filter-item">
                  <label for="log-day">日期</label>
                  <select id="log-day" class="form-select form-select-sm log-day-select trade-filter-select"></select>
                </div>
                <div class="trade-filter-item">
                  <label for="sell-twap-col">卖出TWAP</label>
                  <select id="sell-twap-col" class="form-select form-select-sm log-day-select trade-filter-select"></select>
                </div>
                <button id="btn-trade-refresh" class="btn btn-sm btn-outline-secondary trade-filter-refresh" type="button">刷新</button>
              </div>
            </div>

            <ul class="nav nav-tabs compact-tabs" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-holdings" type="button" role="tab">当前持仓</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-target" type="button" role="tab">收益分析</button>
              </li>
            </ul>
            <div class="tab-content workspace-tabs">
              <div id="tab-holdings" class="tab-pane fade show active" role="tabpanel">
                <div id="holdings" class="holdings-list"></div>
              </div>
              <div id="tab-target" class="tab-pane fade" role="tabpanel">
                <div class="analysis-combined">
                  <div id="return-overview" class="analysis-panel"></div>
                  <div id="return-ranking" class="analysis-panel"></div>
                </div>
              </div>
            </div>
          </section>

        </div>

        <div class="col-xl-4 side-stack order-xl-1">
          <section class="panel-card">
            <div class="panel-head">
              <div>
                <h5 class="mb-0">操作</h5>
                <div class="panel-subtitle">按实盘风险等级分组。</div>
              </div>
            </div>
            <div class="action-stack">
              <div class="action-group">
                <div class="action-group-title">常用操作</div>
                <div class="d-grid gap-2">
                  <button id="btn-open" class="btn btn-primary">启动开盘链路</button>
                  <button id="btn-sync" class="btn btn-outline-success">同步持仓</button>
                </div>
              </div>
              <div class="action-group">
                <div class="action-group-title">维护操作</div>
                <div class="d-grid gap-2">
                  <button id="btn-restart" class="btn btn-outline-warning">重启调度器</button>
                  <button id="btn-shutdown" class="btn btn-outline-secondary">关闭控制台服务</button>
                </div>
              </div>
              <div class="action-group danger-zone">
                <div class="action-group-title">危险操作</div>
                <button id="btn-stop" class="btn btn-outline-danger w-100">紧急停止</button>
              </div>
              <div id="sync-status" class="sync-status"></div>
            </div>
          </section>

          <section class="panel-card log-summary-card">
            <div class="panel-head">
              <div>
                <h5 class="mb-0">告警与日志摘要</h5>
                <div id="log-summary-meta" class="panel-subtitle">暂无日志摘要。</div>
              </div>
              <button class="btn btn-sm btn-outline-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#full-log-panel" aria-expanded="false" aria-controls="full-log-panel">
                完整日志
              </button>
            </div>
            <div id="alert-summary" class="alert-summary"></div>
            <div id="recent-events" class="recent-events"></div>
          </section>

        </div>
      </div>

      <div class="row g-3 mt-1 analysis-row">
        <div class="col-xl-7">
          <section class="panel-card analysis-card">
            <div class="panel-head">
              <div>
                <h5 class="mb-0">绩效摘要</h5>
                <div id="perf-meta" class="panel-subtitle">暂无绩效数据。</div>
              </div>
              <div class="d-flex align-items-center gap-2">
                <label for="perf-lookback" class="small text-muted mb-0">回看</label>
                <input id="perf-lookback" class="form-control form-control-sm perf-lookback-input" type="number" min="1" step="1" value="20">
                <button id="btn-perf-refresh" class="btn btn-sm btn-outline-secondary">刷新</button>
              </div>
            </div>
            <div class="perf-grid">
              <div class="perf-chart-wrap">
                <canvas id="perf-metrics-chart"></canvas>
              </div>
              <div class="perf-chart-wrap">
                <canvas id="perf-nav-chart"></canvas>
              </div>
            </div>
          </section>
        </div>

        <div class="col-xl-5">
          <section class="panel-card analysis-card">
            <div class="panel-head">
              <div>
                <h5 class="mb-0">因子覆盖</h5>
                <div id="calendar-anchor" class="panel-subtitle"></div>
              </div>
            </div>
            <div class="coverage-summary" id="coverage-summary"></div>
            <div class="calendar-legend mb-2">
              <span class="legend-item"><i class="dot dot-ok"></i>齐全</span>
              <span class="legend-item"><i class="dot dot-partial"></i>部分</span>
              <span class="legend-item"><i class="dot dot-missing"></i>缺失</span>
              <span class="legend-item"><i class="dot dot-off"></i>休市/未来</span>
            </div>
            <div id="data-calendar" class="data-calendar"></div>
          </section>
        </div>
      </div>

      <section class="panel-card mt-3 config-panel">
        <div class="panel-head">
          <div>
            <h5 class="mb-0">实盘配置</h5>
            <div class="panel-subtitle">生产配置默认只读，详细配置默认折叠。</div>
          </div>
          <button class="btn btn-sm btn-outline-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#live-config-panel" aria-expanded="false" aria-controls="live-config-panel">
            高级
          </button>
        </div>
        <div id="profile-summary" class="profile-summary"></div>
        <div id="live-config-panel" class="collapse">
          <div class="advanced-config-toolbar">
            <span id="config-mode" class="text-muted small">只读</span>
            <button id="btn-save-config" class="btn btn-sm btn-outline-secondary" disabled>保存配置</button>
          </div>
          <div id="config-list" class="config-list mt-3"></div>
        </div>
      </section>

      <section id="full-log-panel" class="collapse mt-3">
        <div class="panel-card">
          <div class="panel-head">
            <div>
              <h5 class="mb-0">完整日志</h5>
              <div id="log-path" class="panel-subtitle"></div>
            </div>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="log-follow" checked>
              <label class="form-check-label small" for="log-follow">跟随</label>
            </div>
          </div>
          <div class="log-box" id="log-box"></div>
        </div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.7/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="/static/app.js?v=20260525_sellcol4"></script>
  </body>
</html>
