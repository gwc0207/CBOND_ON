<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>CBOND_ON Live Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css?v=20260303e" rel="stylesheet">
  </head>
  <body>
    <div class="container-fluid p-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0">CBOND_ON Live Dashboard</h3>
        <button id="btn-shutdown" class="btn btn-sm btn-outline-danger">Shutdown UI</button>
      </div>
      <div class="row g-3">
        <div class="col-md-3">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title">Controls</h5>
              <div class="d-grid gap-2 mt-3">
                <button id="btn-stop" class="btn btn-danger">Emergency Stop</button>
                <button id="btn-open" class="btn btn-outline-primary">Start Open</button>
                <button id="btn-restart" class="btn btn-outline-warning">Restart Scheduler</button>
                <button id="btn-sync" class="btn btn-outline-success">Sync Holdings</button>
              </div>
              <div id="sync-status" class="sync-status mt-3"></div>
            </div>
          </div>
          <div class="card shadow-sm mt-3">
            <div class="card-body">
              <h5 class="card-title">Processes</h5>
              <div class="text-muted small mb-2" id="process-count">Running: 0</div>
              <div id="process-list" class="process-list"></div>
            </div>
          </div>
        </div>
        <div class="col-md-5">
          <div class="card shadow-sm h-100 holdings-card">
            <div class="card-body holdings-body">
              <h5 class="card-title">Holdings</h5>
              <div id="holdings" class="holdings-list mt-2"></div>
              <div class="perf-panel mt-3">
                <div class="d-flex justify-content-between align-items-center gap-2 mb-2">
                  <h6 class="mb-0">Performance</h6>
                  <div class="d-flex align-items-center gap-2">
                    <label for="perf-lookback" class="small text-muted mb-0">Lookback</label>
                    <input id="perf-lookback" class="form-control form-control-sm perf-lookback-input" type="number" min="1" step="1" value="20">
                    <button id="btn-perf-refresh" class="btn btn-sm btn-outline-secondary">Refresh</button>
                  </div>
                </div>
                <div id="perf-meta" class="small text-muted mb-2"></div>
                <div class="row g-2">
                  <div class="col-md-5">
                    <div class="perf-chart-wrap">
                      <canvas id="perf-metrics-chart"></canvas>
                    </div>
                  </div>
                  <div class="col-md-7">
                    <div class="perf-chart-wrap">
                      <canvas id="perf-nav-chart"></canvas>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card shadow-sm h-100">
            <div class="card-body">
              <h5 class="card-title">Logs</h5>
              <div class="d-flex justify-content-between align-items-center mb-2">
                <div class="d-flex align-items-center gap-2">
                  <label for="log-day" class="small text-muted mb-0">Day</label>
                  <select id="log-day" class="form-select form-select-sm log-day-select"></select>
                </div>
                <div class="form-check form-switch m-0">
                  <input class="form-check-input" type="checkbox" id="log-follow" checked>
                  <label class="form-check-label small" for="log-follow">Follow</label>
                </div>
              </div>
              <div class="log-path text-muted small mb-2" id="log-path"></div>
              <div class="log-box" id="log-box"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="row mt-4">
        <div class="col-12">
          <div class="card shadow-sm">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center">
                <h5 class="card-title mb-0">Live config</h5>
                <div class="d-flex align-items-center gap-2">
                  <button class="btn btn-sm btn-outline-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#live-config-panel" aria-expanded="true" aria-controls="live-config-panel">
                    Toggle
                  </button>
                  <button id="btn-save-config" class="btn btn-sm btn-primary">Save config</button>
                </div>
              </div>
              <div id="live-config-panel" class="collapse show">
                <div id="config-list" class="config-list mt-3"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.7/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="/static/app.js?v=20260303d"></script>
  </body>
</html>
