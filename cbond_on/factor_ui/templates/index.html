<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>因子分析面板</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="brand">因子分析面板</div>
        <div class="controls">
          <label>
            开始日期
            <input type="date" id="global-start" />
          </label>
          <label>
            结束日期
            <input type="date" id="global-end" />
          </label>
          <button id="apply-global">应用全局</button>
        </div>
      </header>

      <section class="panel">
        <div class="panel-header">
          <h2>多因子概览</h2>
          <div class="panel-actions">
            <label>
              排名指标
              <select id="rank-metric">
                <option value="rank_ic_mean">Rank IC</option>
                <option value="ic_mean">IC</option>
                <option value="sharpe">Sharpe</option>
                <option value="nav_end">累计净值</option>
                <option value="win_rate">胜率</option>
              </select>
            </label>
            <button id="refresh-multi">刷新多因子</button>
          </div>
        </div>
        <div class="grid two-col">
          <div class="card">
            <div id="multi-nav" class="chart"></div>
            <div id="multi-status" class="status"></div>
          </div>
          <div class="card">
            <table class="rank-table">
              <thead>
                <tr>
                  <th>因子</th>
                  <th>指标</th>
                  <th>RankIC</th>
                  <th>Sharpe</th>
                </tr>
              </thead>
              <tbody id="rank-body"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>单因子分析</h2>
          <div class="panel-actions">
            <label>
              因子
              <select id="factor-select"></select>
            </label>
            <label>
              独立开始日期
              <input type="date" id="single-start" />
            </label>
            <label>
              独立结束日期
              <input type="date" id="single-end" />
            </label>
            <button id="refresh-single">刷新单因子</button>
          </div>
        </div>

        <div class="grid three-col">
          <div class="card">
            <div class="metric-block">
              <div class="metric-title">Sharpe</div>
              <div class="metric-value" id="metric-sharpe">-</div>
            </div>
          </div>
          <div class="card">
            <div class="metric-block">
              <div class="metric-title">MaxDD</div>
              <div class="metric-value" id="metric-maxdd">-</div>
            </div>
          </div>
          <div class="card">
            <div class="metric-block">
              <div class="metric-title">胜率</div>
              <div class="metric-value" id="metric-win">-</div>
            </div>
          </div>
        </div>

        <div class="grid two-col">
          <div class="card">
            <div id="single-nav" class="chart"></div>
          </div>
          <div class="card">
            <div id="ic-chart" class="chart"></div>
          </div>
        </div>

        <div class="panel-subheader">
          <h3>分箱分析</h3>
          <div class="panel-actions">
            <div id="bin-selector" class="bin-selector"></div>
          </div>
        </div>

        <div class="grid two-col">
          <div class="card">
            <div id="bin-nav" class="chart"></div>
          </div>
          <div class="card">
            <div id="bin-bar" class="chart"></div>
            <div id="single-status" class="status"></div>
          </div>
        </div>
      </section>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
